<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta — Pokeboveda TCG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --amarillo:#FFD700; --rojo:#E3350D;
      --oscuro:#0d0d1a; --medio:#13132b;
      --carta:#1a1a3a; --carta2:#1e1e40;
      --blanco:#eeeef5; --gris:#7070a0;
      --nm:#2ecc71; --lp:#f39c12; --mp:#e74c3c;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--oscuro);color:var(--blanco);min-height:100vh;}

    header{position:sticky;top:0;z-index:100;background:rgba(13,13,26,.97);backdrop-filter:blur(12px);border-bottom:2px solid var(--amarillo);}
    .header-inner{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--amarillo);text-decoration:none;}
    .back-btn{color:var(--gris);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s;}
    .back-btn:hover{color:var(--amarillo);}
    .carrito-btn{background:var(--amarillo);color:#0d0d1a;border:none;padding:10px 20px;border-radius:50px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:transform .2s;flex-shrink:0;}
    .carrito-btn:hover{transform:translateY(-2px);}
    .carrito-count{background:var(--rojo);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

    .estado{text-align:center;padding:80px 24px;color:var(--gris);}
    .spinner{width:44px;height:44px;border:3px solid rgba(255,215,0,.2);border-top-color:var(--amarillo);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* LAYOUT */
    .detalle{max-width:1100px;margin:0 auto;padding:40px 24px 80px;display:grid;grid-template-columns:360px 1fr;gap:48px;align-items:start;}
    @media(max-width:760px){.detalle{grid-template-columns:1fr;gap:28px;padding:20px 16px 80px;}}

    /* IMAGEN */
    .img-col{position:sticky;top:80px;}
    .card-frame{background:linear-gradient(145deg,var(--medio),var(--carta2));border-radius:22px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.07);}
    .card-frame img{max-width:100%;border-radius:10px;box-shadow:0 24px 60px rgba(0,0,0,.6);}
    .img-placeholder{font-size:80px;opacity:.15;padding:40px 0;}

    /* Tags debajo de la imagen */
    .img-tags{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;}
    .rareza-tag{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 16px;border-radius:50px;background:rgba(255,215,0,.1);color:var(--amarillo);border:1px solid rgba(255,215,0,.25);}
    .numero-tag{font-size:12px;color:var(--gris);}

    /* Stock badge grande */
    .stock-badge{width:100%;text-align:center;padding:10px;border-radius:10px;font-weight:700;font-size:14px;}
    .stock-ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:var(--nm);}
    .stock-bajo{background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.3);color:var(--lp);}
    .stock-agotado{background:rgba(227,53,13,.1);border:1px solid rgba(227,53,13,.3);color:var(--rojo);}

    /* INFO */
    .info-col{display:flex;flex-direction:column;gap:22px;}
    .breadcrumb{font-size:12px;color:var(--gris);}
    .breadcrumb a{color:var(--gris);text-decoration:none;transition:color .2s;}
    .breadcrumb a:hover{color:var(--amarillo);}

    .card-header{display:flex;flex-direction:column;gap:6px;}
    .card-set-name{font-size:12px;color:var(--gris);text-transform:uppercase;letter-spacing:1.5px;}
    .card-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,6vw,58px);letter-spacing:3px;color:var(--blanco);line-height:1;}
    .pills-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:4px 12px;border-radius:50px;}
    .pill-gold{background:rgba(255,215,0,.12);color:var(--amarillo);border:1px solid rgba(255,215,0,.25);}
    .pill-gray{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12);}

    /* ENERGIA TIPO */
    .tipo-energy{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:50px;}
    .e-Fire{background:rgba(255,107,53,.15);color:#ff6b35;}
    .e-Water{background:rgba(79,195,247,.15);color:#4fc3f7;}
    .e-Grass{background:rgba(129,199,132,.15);color:#81c784;}
    .e-Lightning{background:rgba(255,213,79,.15);color:#ffd54f;}
    .e-Psychic{background:rgba(206,147,216,.15);color:#ce93d8;}
    .e-Fighting{background:rgba(255,138,101,.15);color:#ff8a65;}
    .e-Darkness{background:rgba(149,117,205,.15);color:#9575cd;}
    .e-Metal{background:rgba(144,164,174,.15);color:#90a4ae;}
    .e-Fairy{background:rgba(244,143,177,.15);color:#f48fb1;}
    .e-Dragon{background:rgba(121,134,203,.15);color:#7986cb;}
    .e-Colorless{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;}
    .stat{background:var(--carta);border-radius:10px;padding:10px 14px;border:1px solid rgba(255,255,255,.06);}
    .stat-label{font-size:10px;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
    .stat-val{font-size:15px;font-weight:600;}
    .stat-hp{color:var(--rojo);}

    /* SECCIONES */
    .seccion{display:flex;flex-direction:column;gap:8px;}
    .sec-titulo{font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:1.5px;}

    .habilidad{background:linear-gradient(135deg,rgba(206,147,216,.08),transparent);border:1px solid rgba(206,147,216,.2);border-radius:12px;padding:14px 16px;}
    .hab-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .hab-nombre{font-size:14px;font-weight:700;color:#ce93d8;}
    .hab-label{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:50px;background:rgba(206,147,216,.15);color:#ce93d8;}
    .hab-texto{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;}

    .ataque{background:var(--carta);border-radius:12px;padding:14px 16px;border:1px solid rgba(255,255,255,.06);}
    .atk-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
    .atk-izq{flex:1;}
    .atk-nombre{font-size:15px;font-weight:700;margin-bottom:4px;}
    .atk-costo{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
    .energy-dot{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
    .atk-texto{font-size:13px;color:rgba(255,255,255,.65);line-height:1.6;}
    .atk-dmg{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--amarillo);line-height:1;}

    .wr-row{display:flex;gap:12px;flex-wrap:wrap;}
    .wr-item{background:var(--carta);border-radius:10px;padding:10px 16px;border:1px solid rgba(255,255,255,.06);}
    .wr-label{font-size:10px;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
    .wr-val{font-size:15px;font-weight:700;}

    .flavor{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7;font-style:italic;padding:14px 16px;background:rgba(255,255,255,.03);border-radius:10px;border-left:3px solid rgba(255,215,0,.3);}
    .regla{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:10px;padding:12px 16px;font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;}

    /* CAJA DE COMPRA */
    .compra-box{background:var(--carta);border-radius:18px;padding:22px;border:1px solid rgba(255,255,255,.09);}
    .comp-titulo{font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
    .opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
    .opt{padding:8px 16px;border-radius:50px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border:1.5px solid rgba(255,255,255,.14);background:transparent;color:rgba(255,255,255,.6);transition:all .18s;}
    .opt:hover{border-color:var(--amarillo);color:var(--amarillo);}
    .opt.sel{background:rgba(255,215,0,.15);border-color:var(--amarillo);color:var(--amarillo);font-weight:700;}
    .opt.sel-nm{background:rgba(46,204,113,.15);border-color:var(--nm);color:var(--nm);font-weight:700;}
    .opt.sel-lp{background:rgba(243,156,18,.15);border-color:var(--lp);color:var(--lp);font-weight:700;}
    .opt.sel-mp{background:rgba(231,76,60,.15);border-color:var(--mp);color:var(--mp);font-weight:700;}

    /* Precio actual (el del Sheets, sin multiplicador) */
    .precio-wrap{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
    .precio-grande{font-family:'Bebas Neue',sans-serif;font-size:46px;color:var(--amarillo);}
    .precio-moneda{font-size:14px;color:var(--gris);}
    .precio-nota{font-size:12px;color:var(--gris);margin-bottom:18px;}

    .btn-add{width:100%;background:var(--amarillo);color:#0d0d1a;border:none;padding:16px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:transform .2s,box-shadow .2s;}
    .btn-add:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,215,0,.4);}
    .btn-add.ok{background:var(--nm);}
    .btn-add:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

    /* CARRITO */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;}
    .overlay.vis{display:block;}
    .panel{position:fixed;top:0;right:-430px;width:420px;max-width:100vw;height:100vh;background:var(--medio);border-left:2px solid var(--amarillo);z-index:300;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
    .panel.open{right:0;}
    .panel-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08);}
    .panel-head h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--amarillo);}
    .panel-head button{background:transparent;border:none;color:var(--blanco);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;}
    .panel-items{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:10px;}
    .empty{color:var(--gris);text-align:center;margin-top:48px;font-size:15px;}
    .ci{background:rgba(255,255,255,.04);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.06);}
    .ci-name{font-weight:500;font-size:13px;line-height:1.3;}
    .ci-set{font-size:11px;color:var(--gris);margin-top:2px;}
    .ci-ctrl{display:flex;align-items:center;gap:8px;}
    .ci-ctrl button{background:rgba(255,255,255,.1);border:none;color:var(--blanco);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;}
    .ci-ctrl button:hover{background:rgba(255,215,0,.3);}
    .ci-qty{min-width:20px;text-align:center;font-weight:600;}
    .ci-price{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amarillo);white-space:nowrap;}
    .panel-foot{padding:18px 24px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:10px;}
    .total-row{display:flex;justify-content:space-between;align-items:baseline;}
    .total-row span{font-size:15px;color:var(--gris);}
    .total-row strong{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--amarillo);}
    .btn-wa{background:#25D366;color:#fff;border:none;padding:16px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:transform .2s;}
    .btn-wa:hover{transform:translateY(-2px);}
    .btn-clear{background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--gris);padding:9px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">⚡ Pokeboveda</a>
    <a class="back-btn" href="javascript:window.close()">✕ Cerrar pestaña</a>
    <button class="carrito-btn" onclick="toggleCarrito()">
      🛒 Carrito <span class="carrito-count" id="cnt">0</span>
    </button>
  </div>
</header>

<div id="contenido">
  <div class="estado"><div class="spinner"></div><p>Cargando carta...</p></div>
</div>

<div class="overlay" id="overlay" onclick="toggleCarrito()"></div>
<aside class="panel" id="panel">
  <div class="panel-head"><h2>Tu pedido</h2><button onclick="toggleCarrito()">✕</button></div>
  <div class="panel-items" id="panel-items"><p class="empty">Tu carrito está vacío</p></div>
  <div class="panel-foot" id="panel-foot" style="display:none">
    <div class="total-row"><span>Total</span><strong id="total-val">$0</strong></div>
    <button class="btn-wa" onclick="enviarWA()">📲 Pedir por WhatsApp</button>
    <button class="btn-clear" onclick="vaciar()">Vaciar carrito</button>
  </div>
</aside>

<script>
const WA_NUM = "573112345678";

// ── Leer parámetros que vienen del catálogo ──
const params     = new URLSearchParams(location.search);
const cardId     = params.get('id')       || '';
const nombreURL  = params.get('nombre')   || '';
const rarezaURL  = params.get('rareza')   || '';
const condURL    = params.get('condicion')|| 'nm';
const precioURL  = parseInt(params.get('precio')) || 0;
const stockURL   = parseInt(params.get('stock'))  || 0;
const expansionURL = params.get('exp')    || '';

const COND = {
  nm: { label:'Near Mint',          clase:'sel-nm' },
  lp: { label:'Lightly Played',     clase:'sel-lp' },
  mp: { label:'Moderately Played',  clase:'sel-mp' },
};

// Colores de energía
const E_COLOR = {
  Fire:'#ff6b35', Water:'#4fc3f7', Grass:'#81c784',
  Lightning:'#ffd54f', Psychic:'#ce93d8', Fighting:'#ff8a65',
  Darkness:'#9575cd', Metal:'#90a4ae', Fairy:'#f48fb1',
  Dragon:'#7986cb', Colorless:'rgba(255,255,255,.4)'
};

let condicionActiva = condURL;
let cardData        = null;
let carrito         = [];

init();

async function init() {
  cargarCarrito();
  if (!cardId) { mostrarError('No se especificó ninguna carta.'); return; }
  try {
    const r = await fetch(`https://api.pokemontcg.io/v2/cards/${cardId}`);
    if (!r.ok) throw new Error('Carta no encontrada en la base de datos.');
    cardData = (await r.json()).data;
    renderDetalle();
  } catch (e) {
    // Si la API falla, mostrar con los datos del Sheets
    renderSinAPI();
  }
}

function mostrarError(msg) {
  document.getElementById('contenido').innerHTML =
    `<div class="estado"><p style="color:var(--mp)">${msg}</p><br>
     <a href="index.html" style="color:var(--amarillo)">← Volver al catálogo</a></div>`;
}

function energyDot(type) {
  const color = E_COLOR[type] || '#888';
  return `<span class="energy-dot" style="background:${color}22;color:${color};border:1px solid ${color}44">${type[0]}</span>`;
}

function stockHTML(stock) {
  if (stock <= 0)  return `<div class="stock-badge stock-agotado">❌ Sin stock</div>`;
  if (stock === 1) return `<div class="stock-badge stock-bajo">⚠️ Último disponible</div>`;
  if (stock <= 3)  return `<div class="stock-badge stock-bajo">⚡ Solo ${stock} disponibles</div>`;
  return `<div class="stock-badge stock-ok">✅ ${stock} en stock</div>`;
}

// ── Render con datos completos de la API ──
function renderDetalle() {
  const d       = cardData;
  const nombre  = nombreURL || d.name;
  const imagen  = d.images?.large || d.images?.small;
  const tipos   = d.types || [];
  const ataques = d.attacks || [];
  const habs    = d.abilities || [];
  const debil   = d.weaknesses || [];
  const resist  = d.resistances || [];
  const retiro  = d.retreatCost?.length || 0;
  const reglas  = d.rules || [];

  document.title = `${nombre} — Pokeboveda TCG`;

  document.getElementById('contenido').innerHTML = `
  <div class="detalle">

    <!-- IMAGEN -->
    <div class="img-col">
      <div class="card-frame">
        ${imagen ? `<img src="${imagen}" alt="${nombre}">` : `<div class="img-placeholder">🃏</div>`}
        <div class="img-tags">
          ${rarezaURL ? `<span class="rareza-tag">${rarezaURL}</span>` : ''}
          <span class="numero-tag">${d.number} / ${d.set.printedTotal} · ${d.set.name}</span>
          ${stockHTML(stockURL)}
        </div>
      </div>
    </div>

    <!-- INFO -->
    <div class="info-col">

      <div class="breadcrumb">
        <a href="index.html">Catálogo</a> → ${d.set.series} → ${d.set.name}
      </div>

      <div class="card-header">
        <div class="card-set-name">${d.set.name} · ${d.set.series}</div>
        <h1 class="card-name">${nombre}</h1>
        <div class="pills-row">
          <span class="pill pill-gold">${d.supertype}${d.subtypes?.length ? ' · '+d.subtypes.join(' · '):''}</span>
          ${tipos.map(t => `<span class="tipo-energy e-${t}">${t}</span>`).join('')}
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-grid">
        ${d.hp            ? `<div class="stat"><div class="stat-label">HP</div><div class="stat-val stat-hp">${d.hp}</div></div>` : ''}
        ${tipos.length    ? `<div class="stat"><div class="stat-label">Tipo</div><div class="stat-val">${tipos.join(' / ')}</div></div>` : ''}
        ${d.evolvesFrom   ? `<div class="stat"><div class="stat-label">Evoluciona de</div><div class="stat-val" style="font-size:12px">${d.evolvesFrom}</div></div>` : ''}
        ${retiro          ? `<div class="stat"><div class="stat-label">Retirada</div><div class="stat-val">${'●'.repeat(retiro)}</div></div>` : ''}
        ${d.artist        ? `<div class="stat"><div class="stat-label">Artista</div><div class="stat-val" style="font-size:11px">${d.artist}</div></div>` : ''}
        ${d.regulationMark? `<div class="stat"><div class="stat-label">Reg. Mark</div><div class="stat-val">${d.regulationMark}</div></div>` : ''}
      </div>

      <!-- HABILIDADES -->
      ${habs.length ? `
        <div class="seccion">
          <div class="sec-titulo">Habilidades</div>
          ${habs.map(h=>`
            <div class="habilidad">
              <div class="hab-header"><span class="hab-nombre">${h.name}</span><span class="hab-label">${h.type||'Ability'}</span></div>
              <div class="hab-texto">${h.text||''}</div>
            </div>`).join('')}
        </div>` : ''}

      <!-- ATAQUES -->
      ${ataques.length ? `
        <div class="seccion">
          <div class="sec-titulo">Ataques</div>
          ${ataques.map(a=>`
            <div class="ataque">
              <div class="atk-row">
                <div class="atk-izq">
                  <div class="atk-costo">${(a.cost||[]).map(energyDot).join('')}</div>
                  <div class="atk-nombre">${a.name}</div>
                  ${a.text?`<div class="atk-texto">${a.text}</div>`:''}
                </div>
                ${a.damage?`<div class="atk-dmg">${a.damage}</div>`:''}
              </div>
            </div>`).join('')}
        </div>` : ''}

      <!-- DEBILIDADES Y RESISTENCIAS -->
      ${(debil.length||resist.length||retiro) ? `
        <div class="seccion">
          <div class="sec-titulo">Debilidad · Resistencia · Retirada</div>
          <div class="wr-row">
            ${debil.map(w=>`<div class="wr-item"><div class="wr-label">Debilidad</div><div class="wr-val">${w.type} ${w.value}</div></div>`).join('')}
            ${resist.map(w=>`<div class="wr-item"><div class="wr-label">Resistencia</div><div class="wr-val">${w.type} ${w.value}</div></div>`).join('')}
            ${retiro?`<div class="wr-item"><div class="wr-label">Retirada</div><div class="wr-val">${'●'.repeat(retiro)}</div></div>`:''}
          </div>
        </div>` : ''}

      <!-- REGLAS -->
      ${reglas.length ? `
        <div class="seccion">
          <div class="sec-titulo">Reglas de carta</div>
          ${reglas.map(r=>`<div class="regla">${r}</div>`).join('')}
        </div>` : ''}

      <!-- FLAVOR TEXT -->
      ${d.flavorText ? `
        <div class="seccion">
          <div class="sec-titulo">Descripción</div>
          <div class="flavor">"${d.flavorText}"</div>
        </div>` : ''}

      <!-- CAJA DE COMPRA -->
      ${cajCompra()}

    </div>
  </div>`;
}

// ── Render de emergencia si la API falla ──
function renderSinAPI() {
  document.title = `${nombreURL} — Pokeboveda TCG`;
  document.getElementById('contenido').innerHTML = `
  <div class="detalle">
    <div class="img-col">
      <div class="card-frame">
        <div class="img-placeholder">🃏</div>
        <div class="img-tags">
          ${rarezaURL ? `<span class="rareza-tag">${rarezaURL}</span>` : ''}
          ${stockHTML(stockURL)}
        </div>
      </div>
    </div>
    <div class="info-col">
      <div class="breadcrumb"><a href="index.html">Catálogo</a> → ${expansionURL}</div>
      <div class="card-header">
        <div class="card-set-name">${expansionURL}</div>
        <h1 class="card-name">${nombreURL}</h1>
        <div class="pills-row"><span class="pill pill-gray">${rarezaURL}</span></div>
      </div>
      ${cajCompra()}
    </div>
  </div>`;
}

// ── Caja de compra (condición + precio del Sheets) ──
function cajCompra() {
  const sinStock = stockURL <= 0;
  return `
    <div class="compra-box">
      <div class="comp-titulo">Condición</div>
      <div class="opts" id="opts-cond">
        <button class="opt ${condicionActiva==='nm'?'sel-nm':''}" onclick="elegirCond('nm',this)">Near Mint</button>
        <button class="opt ${condicionActiva==='lp'?'sel-lp':''}" onclick="elegirCond('lp',this)">Lightly Played</button>
        <button class="opt ${condicionActiva==='mp'?'sel-mp':''}" onclick="elegirCond('mp',this)">Moderately Played</button>
      </div>

      <div class="precio-wrap">
        <div class="precio-grande" id="precio-num">${fmt(precioURL)}</div>
        <div class="precio-moneda">COP</div>
      </div>
      <div class="precio-nota" id="precio-nota">
        Precio para ${COND[condicionActiva]?.label||condicionActiva} · ${rarezaURL}
      </div>

      <button class="btn-add" id="btn-add" onclick="agregarAlCarrito()"
        ${sinStock ? 'disabled' : ''}>
        ${sinStock ? '❌ Sin stock' : '+ Agregar al carrito'}
      </button>
    </div>`;
}

function elegirCond(c, btn) {
  condicionActiva = c;
  document.querySelectorAll('#opts-cond .opt').forEach(b =>
    b.classList.remove('sel-nm','sel-lp','sel-mp')
  );
  btn.classList.add(`sel-${c}`);
  // El precio no cambia — el cliente elige la condición solo para que
  // tú sepas qué estado aceptaría. El precio lo defines tú en el Sheets.
  document.getElementById('precio-nota').textContent =
    `Precio para ${COND[c]?.label||c} · ${rarezaURL}`;
}

function agregarAlCarrito() {
  if (stockURL <= 0) return;
  const nombre  = nombreURL || cardData?.name || cardId;
  const set     = cardData?.set?.name || expansionURL;
  const id      = `${cardId}-${condicionActiva}`;

  const ex = carrito.find(i => i.id === id);
  if (ex) ex.cantidad++;
  else carrito.push({
    id, nombre, set,
    rareza:    rarezaURL,
    condicion: condicionActiva,
    precio:    precioURL,
    cantidad:  1
  });

  guardarCarrito(); renderCarrito();

  const btn = document.getElementById('btn-add');
  if (btn) {
    btn.textContent = '✓ Agregado al carrito';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '+ Agregar al carrito'; btn.classList.remove('ok'); }, 1500);
  }

  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('vis');
}

function fmt(v) { return '$' + v.toLocaleString('es-CO'); }

function cargarCarrito() {
  try { carrito = JSON.parse(sessionStorage.getItem('carrito') || '[]'); } catch { carrito = []; }
  renderCarrito();
}
function guardarCarrito() { sessionStorage.setItem('carrito', JSON.stringify(carrito)); }

function cambiar(id, d) {
  const item = carrito.find(i => i.id === id);
  if (!item) return;
  item.cantidad += d;
  if (item.cantidad <= 0) carrito = carrito.filter(i => i.id !== id);
  guardarCarrito(); renderCarrito();
}

function renderCarrito() {
  const items = document.getElementById('panel-items');
  const foot  = document.getElementById('panel-foot');
  document.getElementById('cnt').textContent = carrito.reduce((a,i) => a+i.cantidad, 0);
  if (!carrito.length) {
    items.innerHTML = '<p class="empty">Tu carrito está vacío</p>';
    foot.style.display = 'none'; return;
  }
  items.innerHTML = carrito.map(i => `
    <div class="ci">
      <div>
        <div class="ci-name">${i.nombre}</div>
        <div class="ci-set">${i.rareza} · ${(i.condicion||'').toUpperCase()}</div>
      </div>
      <div class="ci-ctrl">
        <button onclick="cambiar('${i.id}',-1)">−</button>
        <span class="ci-qty">${i.cantidad}</span>
        <button onclick="cambiar('${i.id}',+1)">+</button>
      </div>
      <div class="ci-price">${fmt(i.precio * i.cantidad)}</div>
    </div>`).join('');
  const total = carrito.reduce((a,i) => a+i.precio*i.cantidad, 0);
  document.getElementById('total-val').textContent = fmt(total);
  foot.style.display = 'flex';
}

function toggleCarrito() {
  document.getElementById('panel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('vis');
}
function vaciar() { carrito = []; guardarCarrito(); renderCarrito(); }

function enviarWA() {
  if (!carrito.length) return;
  const total = carrito.reduce((a,i) => a+i.precio*i.cantidad, 0);
  let msg = '¡Hola! Quiero hacer el siguiente pedido:\n\n';
  carrito.forEach(i => {
    msg += `• ${i.cantidad}x ${i.nombre} — ${i.rareza} — ${(i.condicion||'').toUpperCase()} — ${fmt(i.precio*i.cantidad)}\n`;
  });
  msg += `\n*Total: ${fmt(total)}*\n\n¿Cómo coordino el pago?`;
  window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
}
</script>
