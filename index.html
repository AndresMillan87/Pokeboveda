<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokeboveda TCG — Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-content">
        <div class="logo">POKEBOVEDA <span>TCG</span></div>
        <button class="cart-btn" onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
    </div>
</header>

<main>
    <nav class="filter-main">
        <button class="f-btn active" onclick="filterType('todos', this)">Todos</button>
        <button class="f-btn" onclick="filterType('pokemon', this)">Pokémon</button>
        <button class="f-btn" onclick="filterType('ex', this)">Pokémon ex</button>
        <button class="f-btn" onclick="filterType('supporter', this)">Supporter</button>
        <button class="f-btn" onclick="filterType('item', this)">Item</button>
        <button class="f-btn" onclick="filterType('estadio', this)">Estadio</button>
        <button class="f-btn" onclick="filterType('tool', this)">Tool</button>
        <button class="f-btn" onclick="filterType('energia', this)">Energía</button>
    </nav>

    <div id="sub-filters" class="filter-sub">
        </div>

    <section id="catalog" class="grid"></section>
</main>

<div id="cart-panel" class="cart-panel">
    <div class="cart-header">
        <h2>Tu Pedido</h2>
        <button onclick="toggleCart()">X</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-footer">
        <div class="total">Total: <span id="cart-total">$0</span></div>
        <button class="btn-wa" onclick="sendWhatsApp()">Pedir por WhatsApp</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
